shell:
  paths:
    - path: /usr/local/bin
    - path: .local/bin
      relative: true
    - path: go/bin
      relative: true
    - path: .local/share/aquaproj-aqua/bin
      relative: true
    - path: /Applications/Sublime Text.app/Contents/SharedSupport/bin
      os: darwin

  env:
    AQUA_POLICY_CONFIG: .aqua/aqua-policy.yaml
    EDITOR: micro
    FZF_DEFAULT_COMMAND: fd --type file --color=always
    FZF_DEFAULT_OPTS: --ansi
    FZF_CTRL_T_COMMAND: $FZF_DEFAULT_COMMAND
    FZF_ALT_C_COMMAND: fd --type d --color=always
    GIT_PAGER:
      value: delta
      check: delta
      fallback: less

  aliases:
    cat: bat
    k9s-kflow: aws-vault exec admin-kflow -- k9s
    ll: eza -la
    ls: eza
    gaa: git add -A
    gc: git commit
    gd: git diff
    gs: git status
    gg: lazygit
    nano: micro
    s: kitten ssh
    tre: eza --tree -a --git-ignore
    wtc: wt switch --create
    wts: wt switch
    wtl: wt list
    wtm: wts ^
    y: yazi
    fzp: fzf --preview "bat --color=always --style=numbers --line-range=:500 {}"

  functions:
    cdg:
      description: cd to git root
      nu: cd (git rev-parse --show-toplevel)
      zsh: cd "$(git rev-parse --show-toplevel)"
    dg:
      description: "diff in diffnav: dg (branch vs base), dg -a/--all (working tree incl staged), dg -l/--local (unstaged only), dg [ref]"
      nu: git diff $"($in | default main)...HEAD" | diffnav
      zsh: |
        local all=false local_only=false ref=""
        while [[ $# -gt 0 ]]; do
            case "$1" in
                -h|"--help")
                    printf "\033[1mdg\033[0m — diff in diffnav\n\n"
                    printf "  \033[1m%-20s\033[0m %s\n" "dg" "Branch diff vs auto-detected base (main/master)"
                    printf "  \033[1m%-20s\033[0m %s\n" "dg <ref>" "Branch diff vs <ref>"
                    printf "  \033[1m%-20s\033[0m %s\n" "dg -a, --all" "All changes vs HEAD (staged + unstaged)"
                    printf "  \033[1m%-20s\033[0m %s\n" "dg -l, --local" "Unstaged changes only"
                    return 0 ;;
                -a|--all) all=true; shift ;;
                -l|--local) local_only=true; shift ;;
                *) ref="$1"; shift ;;
            esac
        done
        if $all; then
            git diff HEAD | diffnav
        elif $local_only; then
            git diff | diffnav
        else
            local base="${ref:-$(git symbolic-ref refs/remotes/origin/HEAD 2>/dev/null | sed 's@^refs/remotes/origin/@@')}"
            git diff "${base:-main}...HEAD" | diffnav
        fi
    rcp:
      description: copy realpath to clipboard
      nu: realpath ($in | default .) | pbcopy
      zsh: realpath "${1:-.}" | tr -d '\n' | pbcopy
    paws:
      description: print AWS env vars
      nu: $env | transpose key value | where key =~ "AWS" | format pattern '{key}={value}' | to text
      zsh: env | grep AWS
