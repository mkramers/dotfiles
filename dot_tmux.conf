# tmux config — pane manager inside sandy containers (kitty owns tabs)
set -g prefix C-b

# Sensible defaults
set -g base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g mouse on
set -g history-limit 10000

# Pass through 256 colors and true color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-kitty:Tc"

# Status bar — full-width colored bar, Wez theme colors
set -g status on
set -g status-position bottom
set -g status-style "bg=#333333,fg=#b3b3b3"
set -g status-left " #h "
set -g status-left-style "bg=#4c52f8,fg=#eeeeee"
set -g status-right ""

# Window list styling
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "bg=#4c52f8,fg=#eeeeee"
set -g window-status-style "bg=#333333,fg=#888888"
set -g window-status-separator ""

# Pane splits inherit current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Pane navigation with hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# New windows inherit the current pane's directory
bind c new-window -c "#{pane_current_path}"


# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Auto-install TPM if missing
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
