# Minimal tmux config — used as a "virtual tab" layer inside kitty panes
# Kitty handles splits/tabs, tmux handles window stacking within a pane

# No prefix needed — kitty sends tmux commands directly via Alt+N keybindings
# Keep prefix available for manual use
set -g prefix C-b

# Sensible defaults
set -g base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g mouse on
set -g history-limit 10000

# Pass through 256 colors and true color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-kitty:Tc"

# Status bar — minimal, Harper theme colors
set -g status on
set -g status-position bottom
set -g status-style "bg=#000000,fg=#a7a39c"
set -g status-left ""
set -g status-right ""

# Window list styling
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "bg=#5a5753,fg=#eeeeee"
set -g window-status-style "bg=#000000,fg=#a7a39c"
set -g window-status-separator ""

# New windows inherit the current pane's directory
bind c new-window -c "#{pane_current_path}"
