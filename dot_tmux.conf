# tmux config — pane manager inside sandy containers (kitty owns tabs)
set -g prefix C-b

# Sensible defaults
set -g base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g mouse on
set -g history-limit 10000

# Pass through 256 colors and true color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-kitty:Tc"

# Status bar — minimal, Harper theme colors
set -g status on
set -g status-position bottom
set -g status-style "bg=#000000,fg=#a7a39c"
set -g status-left " #h "
set -g status-left-style "bg=#5a5753,fg=#eeeeee"
set -g status-right ""

# Window list styling
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "bg=#5a5753,fg=#eeeeee"
set -g window-status-style "bg=#000000,fg=#a7a39c"
set -g window-status-separator ""

# Pane splits inherit current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Pane navigation with hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# New windows inherit the current pane's directory
bind c new-window -c "#{pane_current_path}"
