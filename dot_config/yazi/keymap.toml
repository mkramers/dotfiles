[[input.prepend_keymap]]
on   = "<Esc>"
run  = "close"
desc = "Cancel input"

[[mgr.prepend_keymap]]
on   = "<Enter>"
run  = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

[[mgr.prepend_keymap]]
on   = "/"
run  = "filter --smart"
desc = "Filter files"

[[mgr.prepend_keymap]]
on   = "f"
run  = "find --smart"
desc = "Find next file"
