include ./theme.conf
editor micro
font_family RecMonoCasual Nerd Font Mono
font_size 13.0
allow_remote_control socket-only
listen_on unix:/tmp/kitty-{kitty_pid}

map alt+left send_text all \x1b\x62
map alt+right send_text all \x1b\x66
map shift+enter send_text all \x1b[13;2u
macos_option_as_alt yes
shell zsh --login


# BEGIN_KITTY_THEME
# Wez
include current-theme.conf
# END_KITTY_THEME

scrollback_lines 10000
pixel_scroll yes

# Drag pane borders to resize
window_drag_tolerance 5

# Use splits layout for tmux-like pane splitting
enabled_layouts splits:split_axis=auto,stack

# ── Kitty pane/tab controls (Alt+) ──────────────────
# Splits
map f1 new_window_with_cwd
map alt+enter launch --cwd=current
map alt+shift+minus launch --location=hsplit --cwd=current
map alt+shift+backslash launch --location=vsplit --cwd=current

# Navigate between kitty panes
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down

# Resize kitty panes
map ctrl+shift+alt+h resize_window narrower
map ctrl+shift+alt+l resize_window wider
map ctrl+shift+alt+k resize_window taller
map ctrl+shift+alt+j resize_window shorter

# Rotate split axis
map ctrl+shift+r layout_action rotate

# Toggle fullscreen for active kitty pane
map alt+f2 toggle_layout stack

# Toggle minimize active pane
map f3 launch --type=background --allow-remote-control ~/.config/kitty/toggle-minimize.sh

# Kitty tabs (Alt+1-9)
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

# ── Cmd → Zellij passthrough (sends Alt+ sequences) ─
# Tabs
map cmd+t send_text all \x1bt
map cmd+w send_text all \x1bw
map cmd+shift+[ send_text all \x1b{
map cmd+shift+] send_text all \x1b}
map cmd+1 send_text all \x1b1
map cmd+2 send_text all \x1b2
map cmd+3 send_text all \x1b3
map cmd+4 send_text all \x1b4
map cmd+5 send_text all \x1b5
map cmd+6 send_text all \x1b6
map cmd+7 send_text all \x1b7
map cmd+8 send_text all \x1b8
map cmd+9 send_text all \x1b9
# Splits
map cmd+enter send_text all \x1b\r
map cmd+shift+minus send_text all \x1b_
map cmd+shift+backslash send_text all \x1b|
map cmd+shift+d send_text all \x1bD
# Rename tab
map cmd+shift+i send_text all \x1bI
# Fullscreen
map cmd+f2 send_text all \x1b\x1bOQ

# ── Shell / utility ─────────────────────────────────
# Cmd+E → Ctrl+T (fzf file finder)
map cmd+e send_text all \x14

# Option+C → Alt+C (fzf directory cd)
map alt+c send_text all \ec

# Cmd+K → clear terminal (Ctrl+L)
map cmd+k send_text all \x0c

# Copy last command output to clipboard
map ctrl+shift+y launch --type=clipboard --stdin-source=@last_cmd_output

# Open full scrollback in pager
map ctrl+shift+o show_scrollback
