include ./theme.conf
startup_session ./session.conf
editor micro
font_size 13.0
allow_remote_control socket-only
listen_on unix:/tmp/kitty-{kitty_pid}

map alt+left send_text all \x1b\x62
map alt+right send_text all \x1b\x66
shell zsh --login


# BEGIN_KITTY_THEME
# Harper
include current-theme.conf
# END_KITTY_THEME

map f1 new_window_with_cwd
map cmd+enter launch --cwd=current

scrollback_lines 10000

# Use splits layout for tmux-like pane splitting
enabled_layouts splits:split_axis=auto,stack

# Split panes
map ctrl+shift+minus launch --location=hsplit --cwd=current
map ctrl+shift+backslash launch --location=vsplit --cwd=current

# Navigate between panes
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down

# Resize panes
map ctrl+shift+alt+h resize_window narrower
map ctrl+shift+alt+l resize_window wider
map ctrl+shift+alt+k resize_window taller
map ctrl+shift+alt+j resize_window shorter

# Rotate split axis
map ctrl+shift+r layout_action rotate

# Toggle fullscreen for active pane
map f2 toggle_layout stack

# Cmd+E → Ctrl+T (fzf file finder)
map cmd+e send_text all \x14

# Option+C → Alt+C (fzf directory cd)
map alt+c send_text all \ec

# Reset terminal state (fixes stuck keyboard protocol)
map ctrl+shift+escape send_text all \x1bc

# Fuzzy tab switcher (fzf overlay)
map cmd+shift+f launch --type=overlay --cwd=current bash ~/.config/kitty/tab-switcher.sh

# Goto tab by number (ctrl+1-9)
map ctrl+1 goto_tab 1
map ctrl+2 goto_tab 2
map ctrl+3 goto_tab 3
map ctrl+4 goto_tab 4
map ctrl+5 goto_tab 5
map ctrl+6 goto_tab 6
map ctrl+7 goto_tab 7
map ctrl+8 goto_tab 8
map ctrl+9 goto_tab 9

# Tmux window controls (Alt+N for inner "tabs" within a pane)
# Alt+T → new tmux window (prefix + c)
map alt+t send_text all \x02c
# Alt+1-9 → select tmux window by number (prefix + number)
map alt+1 send_text all \x021
map alt+2 send_text all \x022
map alt+3 send_text all \x023
map alt+4 send_text all \x024
map alt+5 send_text all \x025
map alt+6 send_text all \x026
map alt+7 send_text all \x027
map alt+8 send_text all \x028
map alt+9 send_text all \x029
