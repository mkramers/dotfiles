new_tab chezmoi
layout splits
cd /Users/mk/.local/share/chezmoi
launch --var window=left zsh -l -c 'tmux new-session -s chezmoi-main || exec zsh -l'
launch --location=vsplit zsh -l -c 'lazygit; exec zsh -l'
launch --location=hsplit zsh -l -c 'tmux new-session -s chezmoi-aux || exec zsh -l'
focus_matching_window var:window=left

